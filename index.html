<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    
    <title>What's For Dinner</title>
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  
  <body>
    <!-- navbar -->
    <nav id="navbar" class="p-2 bg-white">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="logo d-flex align-items-center">
          <div
            class="img d-flex align-items-center justify-content-center fs-3 me-3 bg-mov"
          >
            <i class="fa-solid fa-address-book text-white fs-4"></i>
          </div>
          <div class="content">
            <h2 class="fs-4 text-black w-100">
              Contact <span class="text-mov">Hub</span>
            </h2>
            <p class="my-0 b w-100">Smart Contact Manager</p>
          </div>
        </div>
        <div
          class="components d-flex align-items-center justify-content-center"
        >
     <button type="button" class="butt border-0 text-white rounded-3 p-2 w-75 bg-mov me-4" data-bs-toggle="modal" data-bs-target="#wormhole_77">
    <i class="fa-solid fa-plus"></i> Add <span class="sp-hidd">contact</span>
</button>
          <div
            class="icon d-flex justify-content-center align-items-center me-4"
          >
            <i class="fa-solid fa-bell"></i>
          </div>
          <div
            class="icon d-flex justify-content-center align-items-center me-4"
          >
            <i class="fa-solid fa-gear"></i>
          </div>
          <div class="avatar d-flex justify-content-center align-items-center">
            <img
              src="./images/avatar-2-CwUcGkzI.jpg"
              alt=""
              class="w-100 rounded-3"
            />
          </div>
        </div>
      </div>
    </nav>

    <!-- home -->
    <div class="home py-5">
      <div class="container">
        <div class="row">
          <div class="col-6 col-lg-4 mb-2">
            <div
              class="total bg-white p-3 rounded-4 d-flex align-items-center justify-content-start"
            >
              <div
                class="ico-tot bg-blue d-flex align-items-center justify-content-center me-3"
              >
                <i class="fa-solid fa-users text-white"></i>
              </div>
              <div class="tot-cont">
                <h4 class="mb-0 text-bensel">Total</h4>
                <span class="ms-2 text-black fw-bold fs-5">0</span>
              </div>
            </div>
          </div>
          <div class="col-6 col-lg-4 mb-2">
            <div
              class="total bg-white p-3 rounded-4 d-flex align-items-center justify-content-start"
            >
              <div
                class="ico-tot bg-orange d-flex align-items-center justify-content-center me-3"
              >
                <i class="fa-solid fa-star text-white"></i>
              </div>
              <div class="tot-cont">
                <h4 class="mb-0 text-bensel">FAVORITES</h4>
                <span class="ms-2 text-black fw-bold fs-5">0</span>
              </div>
            </div>
          </div>
          <div class="col-6 col-lg-4 mb-2">
            <div
              class="total bg-white p-3 rounded-4 d-flex align-items-center justify-content-start"
            >
              <div
                class="ico-tot bg-red d-flex align-items-center justify-content-center me-3"
              >
                <i class="fa-solid fa-heart-pulse text-white"></i>
              </div>
              <div class="tot-cont">
                <h4 class="mb-0 text-bensel">Emergency</h4>
                <span class="ms-2 text-black fw-bold fs-5">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- search -->
      <div class="search py-5">
        <div class="container">
          <div class="row g-4">
            <!-- Left Side -->
            <div class="col-lg-8">
              <div class="sear-content mb-4">
                <h2>All Contacts</h2>
                <p class="text-bensel">Manage and organize your 2 contacts</p>
              </div>

              <!-- Search Input -->
              <div class="search-box mb-4">
                <input
                  type="text"
                  class="form-control"
                  placeholder="🔍 Search by name, phone, or email..."
                />
              </div>

              <!-- Contact Cards -->
              <div class="row g-4  " id="cardsRow">
               

                <div class="col-12 col-md-6">
                  <!-- Card 2 -->
                </div>
              </div>
            </div>

            <!-- Right Side -->
            <div class="col-lg-4">
  
  <div class="favorite-box mb-5">
    <div class="fav-ico total p-3 rounded-4 d-flex align-items-center justify-content-start mb-3">
      <div class="ico-tot bg-orange d-flex align-items-center justify-content-center me-3">
        <i class="fa-solid fa-star text-white"></i>
      </div>
      <div class="tot-cont">
        <h4 class="mb-0 text-bensel">Favorites</h4>
        <span class="ms-2 fw-bold fs-5 text-bensel fs-6">Quick access to starred contacts</span>
      </div>
    </div>
    
    <div id="favoriteContacts"></div> 
  </div>

  <div class="emergency-box">
    <div class="total p-3 rounded-4 d-flex align-items-center justify-content-start mb-3">
      <div class="ico-tot bg-red d-flex align-items-center justify-content-center me-3">
        <i class="fa-solid fa-heart-pulse text-white"></i>
      </div>
      <div class="tot-cont">
        <h4 class="mb-0 text-bensel">Emergency</h4>
        <span class="ms-2 fw-bold fs-6 text-bensel">Important contacts for urgent calls</span>
      </div>
    </div>
    
    <div id="emergencyContacts"></div>
  </div>

</div>
          </div>
        </div>
      </div>
    </div>

    <!-- form -->
    <div class="modal fade" id="wormhole_77" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content quantumShell">
          <div class="modal-header plasmaGate border-0">
            <h3 class="galaxyCore">Add New Contact</h3>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body blackMatter">
            <div class="cosmicZone text-center">
              <div class="starlightOrb mx-auto">
                <i class="fa-solid fa-user"></i>
              </div>

              <button class="meteorButton mt-3">
                <i class="fa-solid fa-camera"></i>
                Change Photo
              </button>
            </div>

            <div class="dragonNest mb-3">
              <label class="phoenixMark"> Full Name <span>*</span> </label>

              <input
                type="text"
                id="nameinput"
                class="shadowInput bord"
                placeholder="Enter full name"
              />
            </div>

            <div class="dragonNest mb-3">
              <label class="phoenixMark"> Phone Number <span>*</span> </label>

              <input
                type="text"
                class="shadowInput bord"
                id="phoneinput"
                placeholder="e.g. 01012345678"
              />
            </div>

            <div class="dragonNest mb-3">
              <label class="phoenixMark"> Email Address </label>

              <input
                type="email"
                class="shadowInput bord"
                id="emailinput"
                placeholder="name@example.com"
              />
            </div>

            <div class="dragonNest mb-3">
              <label class="phoenixMark"> Address </label>

              <input
                type="text"
                class="shadowInput pord"
                id="addressinput"
                placeholder="Enter address"
              />
            </div>

            <div class="dragonNest mb-3">
              <label class="phoenixMark"> Group </label>

              <select class="vortexSelect pord" id="groupselect">
                <option>Select a group</option>
                <option>Family</option>
                <option>Friends</option>
                <option>Work</option>
                <option>school</option>
                <option>other</option>
              </select>
            </div>

            <div class="dragonNest mb-3">
              <label class="phoenixMark"> Notes </label>

              <textarea
                class="lavaField pord"
                id="notestextarea"
                placeholder="Add notes about this contact"
              ></textarea>
            </div>

            <div class="riftArea d-flex align-items-center gap-4">
              <div class="d-flex align-items-center">
                <input type="checkbox" class="chaosCube me-2" id="favCheck" />
                <span>⭐ Favorite</span>
              </div>

              <div class="d-flex align-items-center">
                <input type="checkbox" class="chaosCube me-2" id="emergencyCheck" />
                <span>💖 Emergency</span>
              </div>
            </div>
          </div>

          <div class="modal-footer crystalDock border-0">
            <button class="iceButton" data-bs-dismiss="modal">Cancel</button>

            <button class="thunderRocket" onclick="addProduct()">
              Save Contact
            </button>
          </div>
        </div>
      </div>
    </div>
  
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
